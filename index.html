<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Coding Experience — Suytex Academy</title>
  <meta name="description" content="Nunca has programado. En 5 días tendrás tu propia app en internet. Entrenamiento en vivo de Vibe Coding con AI, para emprendedores con ideas." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Suytex/suytex-design@main/suytex.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--su-brand);
      color: var(--su-white);
      font-family: var(--su-font-body);
      font-weight: 300;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .wrap { max-width: 960px; margin: 0 auto; padding: 0 24px; }

    section { padding: 72px 0; }

    .kicker {
      font-family: var(--su-font-display);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--su-highlight);
      margin-bottom: 18px;
    }

    h1, h2, h3 { font-family: var(--su-font-display); line-height: 1.15; }

    h1 { font-size: clamp(34px, 6vw, 58px); font-weight: 700; }
    h2 { font-size: clamp(26px, 4vw, 38px); font-weight: 700; margin-bottom: 14px; }
    h3 { font-size: 17px; font-weight: 500; margin-bottom: 6px; }

    .lead { font-size: 18px; color: var(--su-mist); max-width: 640px; }

    .accent { color: var(--su-highlight); }

    /* ---------- Top nav / logo ---------- */
    .topnav { padding: 22px 0; }
    .topnav .wrap { display: flex; align-items: center; }
    .logo { display: block; }

    /* ---------- Hero ---------- */
    .hero { padding: 90px 0; border-bottom: var(--su-border); }
    .hero .lead { margin: 22px 0 30px; }
    .hero-badges { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 34px; }
    .badge {
      font-family: var(--su-font-display);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 8px 14px;
      border: var(--su-border);
      border-radius: var(--su-radius);
      color: var(--su-mist);
      background: var(--su-ink);
    }

    /* ---------- Botones CTA ---------- */
    .btn {
      display: inline-block;
      font-family: var(--su-font-display);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-decoration: none;
      padding: 15px 30px;
      border-radius: var(--su-radius);
      background: var(--su-highlight);
      color: #04110b;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px -10px rgba(52, 211, 153, 0.45);
    }

    /* ---------- Cards ---------- */
    .grid { display: grid; gap: 16px; margin-top: 36px; }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .card {
      background: var(--su-ink);
      border: var(--su-border);
      border-radius: var(--su-radius);
      padding: 24px;
    }
    .card p { color: var(--su-mist); font-size: 15px; }

    /* ---------- Programa (tabla) ---------- */
    .md table { width: 100%; border-collapse: collapse; margin-top: 28px; }
    .md th, .md td { text-align: left; padding: 14px 12px; border-bottom: var(--su-border); font-size: 15px; color: var(--su-mist); }
    .md thead th {
      font-family: var(--su-font-display);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--su-highlight);
    }
    .md td:first-child, .md th:first-child {
      color: var(--su-white);
      font-family: var(--su-font-display);
      white-space: nowrap;
    }

    /* ---------- Comparativa ---------- */
    .vs-list { list-style: none; }
    .vs-list li { padding: 9px 0; color: var(--su-mist); font-size: 15px; }
    .vs-list li::before { content: "✕  "; color: #f87171; }
    .vs-list.yes li::before { content: "✓  "; color: var(--su-highlight); }
    .vs-list.yes li { color: var(--su-white); }

    /* ---------- Oferta ---------- */
    .offer {
      background: var(--su-ink);
      border: var(--su-border);
      border-radius: var(--su-radius);
      padding: 44px 34px;
      text-align: center;
      margin-top: 36px;
    }
    .price {
      font-family: var(--su-font-display);
      font-size: clamp(52px, 8vw, 76px);
      font-weight: 700;
      color: var(--su-highlight);
      margin: 8px 0 4px;
    }
    .offer-list { list-style: none; margin: 26px auto 32px; max-width: 460px; text-align: left; }
    .offer-list li { padding: 8px 0; color: var(--su-mist); font-size: 15px; border-bottom: var(--su-border); }
    .offer-list li:last-child { border-bottom: none; }
    .offer-list li::before { content: "✓  "; color: var(--su-highlight); }

    footer {
      border-top: var(--su-border);
      padding: 36px 0 110px;
      text-align: center;
      color: var(--su-mist);
      font-size: 13px;
      font-family: var(--su-font-display);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @keyframes su-fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       BOTÓN FLOTANTE WHATSAPP — fixed, radius 4px (sin círculo/pill)
       ============================================================ */
    .wa-float {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 300;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: #25D366; /* excepción de paleta: verde de marca WhatsApp */
      color: var(--su-white);
      border-radius: var(--su-radius);
      box-shadow: 0 10px 28px -8px rgba(0, 0, 0, 0.55);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .wa-float:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px -8px rgba(0, 0, 0, 0.6);
    }
    .wa-float svg { width: 26px; height: 26px; }

    /* ============================================================
       BURBUJA DEL FLOTANTE — invita al click
       ============================================================ */
    .wa-bubble {
      position: fixed;
      right: 86px;
      bottom: 28px;
      z-index: 300;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--su-ink);
      border: var(--su-border);
      border-radius: var(--su-radius);
      padding: 11px 12px 11px 16px;
      box-shadow: 0 10px 28px -8px rgba(0, 0, 0, 0.55);
      opacity: 0;
      animation: su-fade-up 0.5s ease-out 2.6s forwards;
    }
    .wa-bubble::after {
      content: "";
      position: absolute;
      right: -6px;
      top: 50%;
      width: 10px;
      height: 10px;
      background: var(--su-ink);
      border-top: var(--su-border);
      border-right: var(--su-border);
      transform: translateY(-50%) rotate(45deg);
    }
    .wa-bubble-text {
      font-family: var(--su-font-body);
      font-weight: 300;
      font-size: 13px;
      color: var(--su-white);
      text-decoration: none;
      white-space: nowrap;
    }
    .wa-bubble-text:hover { color: var(--su-highlight); }
  </style>
</head>
<body>

  <nav class="topnav">
    <div class="wrap">
      <img class="logo" src="https://cdn.jsdelivr.net/gh/Suytex/suytex-design@main/suytex-s-blanco.svg" alt="Suytex" width="28" height="28" />
    </div>
  </nav>

  <!-- HERO -->
  <header class="hero">
    <div class="wrap">
      <div id="sec-hero" class="md"></div>
    </div>
  </header>

  <!-- EL PROBLEMA -->
  <section>
    <div class="wrap">
      <div id="sec-problema" class="md"></div>
    </div>
  </section>

  <!-- LA REALIDAD -->
  <section style="border-top: var(--su-border); border-bottom: var(--su-border); background: var(--su-ink);">
    <div class="wrap">
      <div id="sec-realidad" class="md"></div>
    </div>
  </section>

  <!-- LA SOLUCIÓN -->
  <section>
    <div class="wrap">
      <div id="sec-solucion" class="md"></div>
    </div>
  </section>

  <!-- EL PROGRAMA -->
  <section style="border-top: var(--su-border);">
    <div class="wrap">
      <div id="sec-programa" class="md"></div>
    </div>
  </section>

  <!-- TU TRANSFORMACIÓN -->
  <section style="border-top: var(--su-border); background: var(--su-ink);">
    <div class="wrap">
      <div id="sec-transformacion" class="md"></div>
    </div>
  </section>

  <!-- POR QUÉ ES DIFERENTE -->
  <section>
    <div class="wrap">
      <div id="sec-comparativa" class="md"></div>
    </div>
  </section>

  <!-- FORMATO Y PARA QUIÉN -->
  <section style="border-top: var(--su-border);">
    <div class="wrap">
      <div id="sec-formato" class="md"></div>
    </div>
  </section>

  <!-- LA OFERTA -->
  <section style="border-top: var(--su-border);">
    <div class="wrap">
      <div id="sec-oferta-intro" class="md" style="text-align: center;"></div>
      <div class="offer">
        <div id="sec-oferta" class="md"></div>
        <template id="tpl-cta-offer">
          <a id="ctaOffer" href="#" class="btn" target="_blank" rel="noopener noreferrer">Reservar mi cupo ahora</a>
        </template>
      </div>
      <div id="sec-cierre" class="md" style="margin-top: 40px;"></div>
    </div>
  </section>

  <footer>
    <div class="wrap">Vibe Coding · $697 · 5 días — Suytex Academy</div>
  </footer>

  <template id="tpl-cta-hero">
    <a id="ctaHero" href="#" class="btn" target="_blank" rel="noopener noreferrer">Quiero mi app en 5 días</a>
  </template>

  <div id="waBubbleWrap" class="wa-bubble" role="complementary" aria-label="Invitación a escribirnos">
    <a id="waBubble" href="#" class="wa-bubble-text" target="_blank" rel="noopener noreferrer">¿Hablamos? Escríbenos</a>
  </div>

  <a id="waFloat" href="#" class="wa-float" target="_blank" rel="noopener noreferrer" aria-label="Escríbenos por WhatsApp">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413"/>
    </svg>
  </a>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
  <script>
  (function () {
    /* ------------------------------------------------------------
       Contenido: se carga desde assets/content.txt (ruta relativa)
       y se renderiza sección por sección con Marked.js.
       Editar el copy = editar el .txt. El HTML no se toca.
       ------------------------------------------------------------ */
    function parseSections(raw) {
      var sections = {};
      var re = /<!--\s*section:\s*([\w-]+)\s*-->/g;
      var matches = [];
      var m;
      while ((m = re.exec(raw)) !== null) {
        matches.push({ key: m[1], contentStart: re.lastIndex, markerStart: m.index });
      }
      for (var i = 0; i < matches.length; i++) {
        var start = matches[i].contentStart;
        var end = (i + 1 < matches.length) ? matches[i + 1].markerStart : raw.length;
        sections[matches[i].key] = raw.slice(start, end).trim();
      }
      return sections;
    }

    function renderSection(sections, key, mountId) {
      try {
        var mount = document.getElementById(mountId);
        if (!mount) return;
        var md = sections[key];
        if (md == null) throw new Error('Sección "' + key + '" no encontrada en content.txt');
        mount.innerHTML = marked.parse(md);
      } catch (e) {
        console.error('Error renderizando sección "' + key + '":', e);
      }
    }

    function slotIn(templateId, slotSelector) {
      try {
        var tpl = document.getElementById(templateId);
        var slot = document.querySelector(slotSelector);
        if (tpl && slot) slot.replaceWith(tpl.content.cloneNode(true));
      } catch (e) {
        console.error('No se pudo insertar el CTA "' + templateId + '":', e);
      }
    }

    function wireWhatsApp() {
      /* Número ofuscado — no queda en texto plano en el HTML */
      var WA = "https://wa.me/" + atob("MTgwOTQwODk5OTk=");
      var TEXT = encodeURIComponent("Hola, vengo desde code.suytex.com y quiero saber más sobre Vibe Coding Experience");
      var href = WA + "?text=" + TEXT;
      ["waBubble", "waFloat", "ctaHero", "ctaOffer"].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.href = href;
      });
    }

    fetch('assets/content.txt')
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
      })
      .then(function (raw) {
        var sections = parseSections(raw);
        renderSection(sections, 'hero', 'sec-hero');
        renderSection(sections, 'problema', 'sec-problema');
        renderSection(sections, 'realidad', 'sec-realidad');
        renderSection(sections, 'solucion', 'sec-solucion');
        renderSection(sections, 'programa', 'sec-programa');
        renderSection(sections, 'transformacion', 'sec-transformacion');
        renderSection(sections, 'comparativa', 'sec-comparativa');
        renderSection(sections, 'formato', 'sec-formato');
        renderSection(sections, 'oferta-intro', 'sec-oferta-intro');
        renderSection(sections, 'oferta', 'sec-oferta');
        renderSection(sections, 'cierre', 'sec-cierre');

        slotIn('tpl-cta-hero', '[data-slot="cta-hero"]');
        slotIn('tpl-cta-offer', '[data-slot="cta-offer"]');
        wireWhatsApp();
      })
      .catch(function (e) {
        console.error('No se pudo cargar assets/content.txt:', e);
        wireWhatsApp();
      });
  })();
  </script>

</body>
</html>
